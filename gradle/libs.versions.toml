adventureFabric = "net.kyori:adventure-platform-fabric:7.1.1"

configurateBom = "org.spongepowered:configurate-bom:4.2.0"
configurateCore = { module = "org.spongepowered:configurate-core" }
configurateHocon = { module = "org.spongepowered:configurate-hocon" }
