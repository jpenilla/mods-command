[versions]
minecraft = "26.2"
fabricLoader = "0.19.3"
fabricApi = "0.154.0+26.2"
indra = "4.0.0"
loom = "1.17-SNAPSHOT"
modPublishPlugin = "2.1.1"
resourceFactory = "1.3.1"

[libraries]
minecraft = { module = "com.mojang:minecraft", version.ref = "minecraft" }

fabricLoader = { module = "net.fabricmc:fabric-loader", version.ref = "fabricLoader" }
fabricApi = { module = "net.fabricmc.fabric-api:fabric-api", version.ref = "fabricApi" }

cloudBom = { module = "org.incendo:cloud-bom", version = "2.0.0" }
